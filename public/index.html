<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ARIA" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>ARIA — Productivity Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">🧠</div>
          <div class="logo-text-wrap">
            <span class="logo-name">ARIA</span>
            <span class="logo-sub">Productivity Assistant</span>
          </div>
        </div>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </button>
      </div>
    </header>

    <!-- Main -->
    <main class="main" id="captureView">

      <!-- Mic -->
      <div class="mic-section">
        <div class="mic-ring-outer">
          <div class="mic-ring-inner">
            <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
              🎙️
            </button>
          </div>
        </div>
        <p class="mic-label" id="micStatus">Tap to speak</p>
      </div>

      <!-- Transcript -->
      <div class="transcript-box">
        <p id="transcriptText">Your words will appear here...</p>
      </div>

      <!-- Manual input -->
      <div class="input-row">
        <input type="text" id="manualInput" placeholder="Or type your command..." autocomplete="off" />
        <button class="send-btn" id="manualSubmit" aria-label="Send">→</button>
      </div>

      <!-- Result card -->
      <div class="result-card hidden" id="resultBox">
        <div class="result-tag" id="resultTag">📋 ARIA</div>
        <p id="resultText"></p>
        <div id="calendarLinkBox" class="hidden">
          <a id="calendarLink" href="#" target="_blank" class="calendar-link">
            View in Google Calendar →
          </a>
        </div>
        <div class="action-row">
          <button class="btn-confirm" id="confirmBtn">Looks Good</button>
          <button class="btn-redo" id="redoBtn">Try Again</button>
        </div>
      </div>

      <!-- Email draft -->
      <div id="emailDraftBox" class="email-draft-box hidden"></div>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" id="navCapture">
        <span class="nav-icon">🎙️</span>
        <span>Capture</span>
      </button>
      <button class="nav-item" id="navTasks">
        <span class="nav-icon">📋</span>
        <span>Tasks</span>
      </button>
      <button class="nav-item" id="navCalendar">
        <span class="nav-icon">📅</span>
        <span>Calendar</span>
      </button>
      <button class="nav-item" id="navSettings">
        <span class="nav-icon">⚙️</span>
        <span>Settings</span>
      </button>
    </nav>

  </div>

  <script src="script.js"></script>
</body>
</html>
