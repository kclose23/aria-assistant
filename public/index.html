<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — Your Productivity Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 ARIA</h1>
      <p class="subtitle">Adaptive Recall & Intelligent Assistant</p>
      <a href="/connect.html" class="connect-link">🔗 Connect Calendars</a>
    </header>

    <div class="mic-section">
      <button id="micBtn" class="mic-btn">🎙️</button>
      <p id="micStatus">Tap to speak</p>
    </div>

    <div class="transcript-box" id="transcriptBox">
      <p id="transcriptText">Your words will appear here...</p>
    </div>

    <div class="result-box hidden" id="resultBox">
      <h3>📋 ARIA Heard:</h3>
      <p id="resultText"></p>
      <div id="calendarLinkBox" class="hidden">
        <a id="calendarLink" href="#" target="_blank" class="calendar-link">
          📅 View in Google Calendar →
        </a>
      </div>
      <div class="result-actions">
        <button class="confirm-btn" id="confirmBtn">✅ Looks Good</button>
        <button class="redo-btn" id="redoBtn">🔄 Try Again</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
