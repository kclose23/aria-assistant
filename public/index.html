<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ARIA" />
  <meta name="theme-color" content="#1c1c1e" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>ARIA — Productivity Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg width="22" height="22" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="brain-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#8b84ff"/>
                  <stop offset="100%" stop-color="#3ecfcf"/>
                </linearGradient>
              </defs>
              <path d="M36 14 C26 14 18 21 18 30 C18 36 21 40 26 42 C26 46 29 50 33 51 L36 51 L39 51 C43 50 46 46 46 42 C51 40 54 36 54 30 C54 21 46 14 36 14 Z" fill="url(#brain-grad)" opacity="0.2"/>
              <path d="M36 14 C26 14 18 21 18 30 C18 36 21 40 26 42 C26 46 29 50 33 51 L36 51 L39 51 C43 50 46 46 46 42 C51 40 54 36 54 30 C54 21 46 14 36 14 Z" fill="none" stroke="url(#brain-grad)" stroke-width="2.5"/>
              <line x1="36" y1="14" x2="36" y2="51" stroke="url(#brain-grad)" stroke-width="1.5" opacity="0.25"/>
              <circle cx="28" cy="24" r="3" fill="#8b84ff" opacity="0.8"/>
              <circle cx="44" cy="24" r="3" fill="#3ecfcf" opacity="0.8"/>
              <circle cx="22" cy="32" r="3" fill="#8b84ff" opacity="0.6"/>
              <circle cx="50" cy="32" r="3" fill="#3ecfcf" opacity="0.6"/>
              <circle cx="27" cy="41" r="3" fill="#8b84ff" opacity="0.5"/>
              <circle cx="45" cy="41" r="3" fill="#3ecfcf" opacity="0.5"/>
              <circle cx="36" cy="28" r="4" fill="url(#brain-grad)"/>
              <line x1="28" y1="24" x2="36" y2="28" stroke="#8b84ff" stroke-width="1.5" opacity="0.5"/>
              <line x1="44" y1="24" x2="36" y2="28" stroke="#3ecfcf" stroke-width="1.5" opacity="0.5"/>
              <line x1="22" y1="32" x2="36" y2="28" stroke="#8b84ff" stroke-width="1.5" opacity="0.35"/>
              <line x1="50" y1="32" x2="36" y2="28" stroke="#3ecfcf" stroke-width="1.5" opacity="0.35"/>
              <line x1="27" y1="41" x2="36" y2="28" stroke="#8b84ff" stroke-width="1.5" opacity="0.25"/>
              <line x1="45" y1="41" x2="36" y2="28" stroke="#3ecfcf" stroke-width="1.5" opacity="0.25"/>
            </svg>
          </div>
          <div class="logo-text-wrap">
            <span class="logo-name">ARIA</span>
            <span class="logo-sub">Productivity Assistant</span>
          </div>
        </div>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings">
          <span class="menu-line"></span>
          <span class="menu-line short"></span>
          <span class="menu-line"></span>
        </button>
      </div>
    </header>

    <main class="main">
      <div class="mic-section">
        <div class="mic-ring-outer">
          <div class="mic-ring-inner">
            <button class="mic-btn" id="micBtn" aria-label="Tap to speak">🎙️</button>
          </div>
        </div>
        <p class="mic-label" id="micStatus">Tap to speak</p>
      </div>

      <div class="transcript-box">
        <p id="transcriptText">Your words will appear here...</p>
      </div>

      <div class="input-row">
        <input type="text" id="manualInput" placeholder="Or type your command..." autocomplete="off" />
        <button class="send-btn" id="manualSubmit" aria-label="Send">→</button>
      </div>

      <div class="result-card hidden" id="resultBox">
        <div class="result-tag" id="resultTag">📋 ARIA</div>
        <p id="resultText"></p>
        <div id="calendarLinkBox" class="hidden">
          <a id="calendarLink" href="#" target="_blank" class="calendar-link">View in Google Calendar →</a>
        </div>
        <div class="action-row">
          <button class="btn-confirm" id="confirmBtn">Looks Good</button>
          <button class="btn-redo" id="redoBtn">Try Again</button>
        </div>
      </div>

      <div id="emailDraftBox" class="email-draft-box hidden"></div>

      <a href="/connect.html" class="connect-link">🔗 Connect Calendars</a>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" id="navCapture">
        <span class="nav-icon">🎙️</span>
        <span>Capture</span>
      </button>
      <button class="nav-item" id="navTasks">
        <span class="nav-icon">📋</span>
        <span>Tasks</span>
      </button>
      <button class="nav-item" id="navCalendar">
        <span class="nav-icon">📅</span>
        <span>Calendar</span>
      </button>
      <button class="nav-item" id="navSettings">
        <span class="nav-icon">⚙️</span>
        <span>Settings</span>
      </button>
    </nav>

  </div>
  <script src="script.js"></script>
</body>
</html>
